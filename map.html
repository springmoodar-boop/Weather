<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Satellite Plain – MapTiler Cloud</title>
    <script src="https://cdn.maptiler.com/maptiler-sdk-js/v3.8.0/maptiler-sdk.umd.min.js"></script>
    <link href="https://cdn.maptiler.com/maptiler-sdk-js/v3.8.0/maptiler-sdk.css" rel="stylesheet" />

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
        }

        #ol-logo {
            position: absolute;
            bottom: 6px;
            left: 6px;
            z-index: 999;
        }

        #ol-logo img {
            width: 100px;
        }

        .ol-zoom {
            right: .5em;
            left: unset;
        }

        .chess {
            background:
                repeating-conic-gradient(#fff 0deg 90deg,
                    #e6e6e6 0deg 180deg) 0 0/40px 40px round;
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <script>
        var useRetina = window.devicePixelRatio > 1;
    </script>

    <script>
        maptilersdk.config.apiKey = 'kpIy0r4F3HGmiaUJYjMc';
    var map = new maptilersdk.Map({
      container: 'map',
      style: 'satellite-v4',
      hash: true,
      maptilerLogo: true,
      maxPitch: 85,
      language: maptilersdk.Language.STYLE_LOCK
    });
    
    </script>

</body>
</html>
